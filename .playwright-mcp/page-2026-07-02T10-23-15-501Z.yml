          - generic [ref=f182e77]:
            - generic [ref=f182e79]:
              - paragraph [ref=f182e80]:
                - text: 春天的风吹过隆德尔城外的麦田，带着泥土和青草的气味。我站在城门口的石板路上，抬头看着城门上方斑驳的石刻——
                - generic [ref=f182e81]: 「隆德尔」
                - text: 两个字已经被风雨侵蚀得有些模糊了。
              - paragraph [ref=f182e82]: "\"主人～我们到了呢！\""
              - paragraph [ref=f182e83]: 菲尔从我身后探出脑袋，栗色的马尾随着她的动作轻轻晃动。她的眼睛亮晶晶的，像是第一次出门远足的孩子。分明一路上走了好几天，她居然还能这么精神——不愧是年轻人。
              - paragraph [ref=f182e84]: 啊，不过她好像比我还小一岁来着。
            - generic [ref=f182e85]:
              - generic [ref=f182e86]:
                - generic [ref=f182e87]: 菲
                - generic [ref=f182e88]:
                  - generic [ref=f182e89]: 菲尔
                  - generic [ref=f182e90]: 奴隶 / 旅伴
              - generic [ref=f182e91]: 栗色马尾，眼睛总是亮晶晶的，像只永远精力充沛的小狗。虽然脖子上戴着奴隶项圈，但她的笑容里没有一丝阴霾。比她年长一岁的主人总是拿她没办法。
            - generic [ref=f182e93]:
              - paragraph [ref=f182e94]:
                - generic [ref=f182e95]: 「嗯，到了。」
                - text: 我把手搭在剑柄上，扫了一眼城门周围。城门口的卫兵正百无聊赖地靠在墙上打哈欠，角落里蹲着几个衣衫褴褛的乞丐，石墙上贴着几张泛黄的委托单——
                - generic [ref=f182e96]: 「讨伐狂暴史莱姆」
                - generic [ref=f182e97]: 「采集月光草」
                - generic [ref=f182e98]: 「墓园调查委托」
                - text: ，报酬都不算高，正好适合新手。
              - paragraph [ref=f182e99]: 冒险者工会就在城门进去不远的地方。来的路上听商队的人说，隆德尔最近不太平——魔物异常活跃，下水道里冒出了从没见过的怪物。工会正缺人手。正适合我这种刚起步的冒险者。
              - paragraph [ref=f182e100]: "\"让开。\""
              - paragraph [ref=f182e101]: 一个冷冰冰的声音从背后传来。我下意识侧身，一辆装饰华丽的马车从我身边缓缓驶过。车厢的窗帘被一只纤细的手撩开——
              - paragraph [ref=f182e102]: 一张精致的脸从车窗中探出来。金色的卷发，蓝宝石色的眼睛，五官像是名家手绘的肖像画。但那双眼睛里没有任何温度，只有居高临下的审视。
              - paragraph [ref=f182e103]: 她扫了我一眼。那种眼神——就像在看路边的野草。
              - paragraph [ref=f182e104]:
                - generic [ref=f182e105]: 「又来了一群闻着铜臭味就扑过来的苍蝇。」
              - paragraph [ref=f182e106]: 声音不大不小，刚好够让我和菲尔听清楚。然后窗帘落下，马车继续驶进了城门。
            - generic [ref=f182e107]:
              - generic [ref=f182e108]:
                - generic [ref=f182e109]: 艾
                - generic [ref=f182e110]:
                  - generic [ref=f182e111]: 艾莉西亚
                  - generic [ref=f182e112]: 贵族少女 / 罗森堡家大小姐
              - generic [ref=f182e113]: 金色卷发如瀑布般垂落，蓝宝石色的眼眸中有远超年龄的锐利。精致的五官仿佛名家手绘的肖像——但那双眼睛里藏着的，似乎不只是傲慢那么简单。
            - generic [ref=f182e115]:
              - paragraph [ref=f182e116]: 菲尔扯了扯我的袖子，小声说："主人……那个人好凶。"
              - paragraph [ref=f182e117]: "\"嗯。不过她说的也不是全错。\"我笑了一下，\"我确实是为了赚钱来的。\""
              - paragraph [ref=f182e118]: 不过——那个贵族小姐，她的眼神里好像藏着什么东西。不是单纯的傲慢。说不上来，但我的直觉告诉我，那不只是轻蔑。
              - paragraph [ref=f182e119]: 算了，先不管这些。当务之急是去冒险者工会登记。
              - paragraph [ref=f182e120]: "\"走吧，菲尔。先去工会报到。\""
              - paragraph [ref=f182e121]:
                - generic [ref=f182e122]: 「是～主人！」
              - paragraph [ref=f182e123]: 我迈开步子，走进了隆德尔的城门。从今天开始，这座边境城镇就是我的新战场了。
            - generic [ref=f182e124]:
              - generic [ref=f182e125]: 站在隆德尔的城门内，晨光洒在石板路上。接下来你打算先去哪里？

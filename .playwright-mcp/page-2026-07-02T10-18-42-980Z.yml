          - generic [ref=f155e233]:
            - paragraph [ref=f155e234]: 春天的风吹过隆德尔城外的麦田，带着泥土和青草的气味。我站在城门口的石板路上，抬头看着城门上方斑驳的石刻——「隆德尔」两个字已经被风雨侵蚀得有些模糊了。
            - paragraph [ref=f155e235]: "\"主人～我们到了呢！\""
            - paragraph [ref=f155e236]: 菲尔从我身后探出脑袋，栗色的马尾随着她的动作轻轻晃动。她的眼睛亮晶晶的，像是第一次出门远足的孩子。分明一路上走了好几天，她居然还能这么精神——不愧是年轻人。
            - paragraph [ref=f155e237]: 啊，不过她好像比我还小一岁来着。
            - paragraph [ref=f155e238]:
              - text: 奴隶 / 旅伴
              - text: 栗色马尾，眼睛总是亮晶晶的，像只永远精力充沛的小狗。虽然脖子上戴着奴隶项圈，但她的笑容里没有一丝阴霾。比她年长一岁的主人总是拿她没办法。
            - paragraph [ref=f155e239]: 「嗯，到了。」我把手搭在剑柄上，扫了一眼城门周围。城门口的卫兵正百无聊赖地靠在墙上打哈欠，角落里蹲着几个衣衫褴褛的乞丐，石墙上贴着几张泛黄的委托单——「讨伐狂暴史莱姆」「采集月光草」「墓园调查委托」，报酬都不算高，正好适合新手。
            - paragraph [ref=f155e240]: 冒险者工会就在城门进去不远的地方。来的路上听商队的人说，隆德尔最近不太平——魔物异常活跃，下水道里冒出了从没见过的怪物。工会正缺人手。正适合我这种刚起步的冒险者。
            - paragraph [ref=f155e241]: "\"让开。\""
            - paragraph [ref=f155e242]: 一个冷冰冰的声音从背后传来。我下意识侧身，一辆装饰华丽的马车从我身边缓缓驶过。车厢的窗帘被一只纤细的手撩开——
            - paragraph [ref=f155e243]: 一张精致的脸从车窗中探出来。金色的卷发，蓝宝石色的眼睛，五官像是名家手绘的肖像画。但那双眼睛里没有任何温度，只有居高临下的审视。
            - paragraph [ref=f155e244]: 她扫了我一眼。那种眼神——就像在看路边的野草。
            - paragraph [ref=f155e245]: 「又来了一群闻着铜臭味就扑过来的苍蝇。」
            - paragraph [ref=f155e246]: 声音不大不小，刚好够让我和菲尔听清楚。然后窗帘落下，马车继续驶进了城门。
            - paragraph [ref=f155e247]:
              - text: 贵族少女 / 罗森堡家大小姐
              - text: 金色卷发如瀑布般垂落，蓝宝石色的眼眸中有远超年龄的锐利。精致的五官仿佛名家手绘的肖像——但那双眼睛里藏着的，似乎不只是傲慢那么简单。
            - paragraph [ref=f155e248]: 菲尔扯了扯我的袖子，小声说："主人……那个人好凶。"
            - paragraph [ref=f155e249]: "\"嗯。不过她说的也不是全错。\"我笑了一下，\"我确实是为了赚钱来的。\""
            - paragraph [ref=f155e250]: 不过——那个贵族小姐，她的眼神里好像藏着什么东西。不是单纯的傲慢。说不上来，但我的直觉告诉我，那不只是轻蔑。
            - paragraph [ref=f155e251]: 算了，先不管这些。当务之急是去冒险者工会登记。
            - paragraph [ref=f155e252]: "\"走吧，菲尔。先去工会报到。\""
            - paragraph [ref=f155e253]: 「是～主人！」
            - paragraph [ref=f155e254]: 我迈开步子，走进了隆德尔的城门。从今天开始，这座边境城镇就是我的新战场了。
            - paragraph [ref=f155e255]:
              - text: 直奔冒险者工会——先登记成为正式冒险者，顺便看看告示墙上的委托
              - text: 在城门附近的商业街转转，熟悉一下这座边境城镇的店铺和设施
              - text: 追上那辆马车——那个金发少女的态度让人在意，她到底是什么来头
              - text: 先找家旅店安顿下来，让赶了好几天路的菲尔好好休息一下

---
变量更新规则:
  世界:
    当前时间:
      format: 自然语言描述（如"三日后的午后"、"同一天的傍晚"）
    当前地点:
      type: string
      check:
        - 根据玩家移动更新地点名称
    近期事务:
      type: |
        { [事务名: string]: string; }
      check:
        - 记录当前需要完成的任务、约定、重要事件
        - 完成后从列表中移除，新增事务时及时添加

  主线:
    章节:
      type: number
      range: 0~4
      check:
        - 仅在当前章节所有必要条件满足后推进到下一章
        - 第一章→第二章：第一章_任务完成数 >= 3
        - 第二章→第三章：第二章_下水道调查完成 = true
        - 第三章→第四章：第三章_真相揭露 = true 且 玩家做出明确路线选择
        - 不能跳章
    路线:
      type: enum
      check:
        - 仅在第三章真相揭露后、玩家做出明确选择时设置
        - 选择"救赎"进入第四章A，选择"制裁"进入第四章B
    第一章_任务完成数:
      type: number
      range: 0~3
      check:
        - 完成一个初级任务时+1
        - 三个任务：郊外讨伐史莱姆、采集药草、墓园调查
    关键flag:
      type: |
        { [flag名: string]: boolean; }
      check:
        - 剧情关键节点触发后设为true
        - 见过艾莉西亚城门出场：城门初见剧情触发
        - 完成冒险者登记：工会登记完成
        - 完成设施引导：所有设施介绍完毕
        - 被赛拉击败：第二章下水道赛拉战
        - 收到匿名信：第三章触发条件

  主角:
    属性:
      check:
        - 战斗胜利、训练、获得装备时适当提升
        - 生命值在战斗受伤时减少、休息/治疗时恢复
        - 单次提升不超过5点
    金钱:
      type: number
      check:
        - 完成任务获得报酬、购物消费时减少
    物品栏:
      type: |
        { [物品名: string]: { 描述: string; 数量: number; }; }
      check:
        - 获得新物品时insert，消耗时减少数量，数量归零时remove
    打屁股统计:
      check:
        - 每次spank场景后更新对应角色计数和总次数
        - 总次数为所有角色次数之和
    成就:
      check:
        - 重要里程碑达成时设为true

  菲尔:
    好感度:
      type: number
      range: 0~100
      check:
        - 日常互动、关心菲尔时 +2~5
        - 打屁股后 +1~3（她虽不喜欢但感受到关心）
        - 忽视或冷落时 -2~3
    支线完成:
      check:
        - SQ1: 随机旅店事件中发现日记后完成
        - SQ2: 第二章后菲尔战斗晕倒3次以上，发现她找赛拉特训后完成
        - SQ3: 30天以上+SQ1+SQ2完成，生日事件后完成
    专属flag:
      check:
        - 对应事件触发后设为true

  艾莉西亚:
    好感度:
      type: number
      range: 0~100
      check:
        - 发现夜间来访(SQ1)+5、收到药水(SQ2)+5、目睹祈祷(SQ3)+10
        - 第三章选择帮助她+20、选择制裁-30
        - 救赎路线日常互动+3~5、打屁股后+5
    支线完成:
      check:
        - SQ1: 夜间去罗森堡旧宅发现她偷偷做慈善
        - SQ2: 赛拉替她送来回复药水
        - SQ3: 夜间在教会发现她独自祈祷
        - SQ4: 结局A后，日常互动中触发

  赛拉:
    好感度:
      type: number
      range: 0~100
      check:
        - SQ1完成+10、SQ2木剑训练+15
        - 结局B路线SQ3会导致好感度大幅下降
    支线完成:
      check:
        - SQ1: 第二章后夜间去下水道
        - SQ2: 结局A路线，SQ1完成后触发木剑训练
        - SQ3: 结局B路线，SQ1完成后触发断绝关系
        - SQ4: 结局A路线，SQ1+SQ2完成后成为工会教官

  米莉:
    好感度:
      type: number
      range: 0~100
      check:
        - 完成她推荐的任务+2~3、接受打屁股请求+5
    支线完成:
      check:
        - SQ1: 菲尔被打屁股后的次日触发三重任务
        - SQ2: SQ1+5次酒馆情报后建立情报网
        - SQ3: 第三章后+SQ2完成触发大冒险

  艾琳:
    好感度:
      type: number
      range: 0~100
      check:
        - 帮忙看店+3、打屁股后+5（她矛盾地感受到关心）
    支线完成:
      check:
        - SQ1: 帮助看店
        - SQ2: 10天后离家出走事件
        - SQ3: 米莉SQ2完成后触发独家情报

  露露拉拉:
    好感度:
      type: number
      range: 0~100
      check:
        - 选择帮助一方时该方好感+10
    支线完成:
      check:
        - SQ1: 目睹姐妹争吵
        - SQ2: 选择帮助露露或拉拉（分支选择）
        - SQ3: 救援父亲

  哈尼:
    好感度:
      type: number
      range: 0~100
      check:
        - 首次对话自动+5、购物+（消费金额/100）、完成其他角色支线后对话+3
    支线完成:
      check:
        - SQ1: 首次进入商店（问卷）
        - SQ2: 消费金额>=5000
        - SQ3: 3个以上角色支线完成+10次以上对话
        - SQ4: 所有其他角色支线完成（自动结算）
    专属flag:
      check:
        - 消费金额：每次在商店购物时累加
        - 真相之板已赠送：所有角色支线+主线第四章完成后自动触发

  玛丽亚:
    好感度:
      type: number
      range: 0~100
      check:
        - 祈祷+2、帮她解围+5
    支线完成:
      check:
        - SQ1: 祈祷3次+夜间访问教会
        - SQ2: SQ1完成7天后考试事件
        - SQ3: 第三章后触发瘟疫事件

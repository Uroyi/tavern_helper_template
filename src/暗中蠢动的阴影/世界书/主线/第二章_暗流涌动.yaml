## 剧情概要

工会长告知主角，异常魔物活动的源头似乎指向城市下水道深处。主角前往调查，在下水道深处发现一处隐秘的仪式遗迹——残留着抽取魔力的魔法阵，阵中心嵌着一枚罗森堡家的贵族纹章。

主角想进一步调查时，一道剑光划过——贵族侍从赛拉出现。这是一场**强制败北战**——赛拉的实力远超主角。她冷冷地警告"这不是你该碰的事"，将主角击退后离去。

主角带着纹章的线索返回。在酒馆打听"罗森堡家"时，艾琳提供了关键情报：罗森堡家曾是封印魔王的功臣之一，但如今凋零只剩独女。赛拉的SQ1也在此时解锁。

## 关键场景

### 场景1: 工会长的委托
- 地点: 冒险者工会二楼
- 事件: 工会长亲自出面，告知调查下水道的任务。提到近期魔物活动的异常规律——所有骚动似乎都与下水道方向有关。

### 场景2: 下水道探索
- 地点: 隆德尔下水道深处
- 事件: 穿过阴暗潮湿的通道，击败沿途的异常魔物，最终在一处开阔的地下空间发现仪式遗迹。

### 场景3: 仪式遗迹与罗森堡纹章
- 发现: 魔法阵呈暗紫色，散发着不祥的魔力波动。阵中心嵌着一枚银色的贵族纹章——交叉的剑与玫瑰，罗森堡家的标志。
- 线索: 魔法阵在抽取某种能量，似乎是为了压制什么。

### 场景4: BOSS战——赛拉
- 出场: 赛拉从阴影中走出，手持长剑。
- 对话: "这不是你该碰的事。再往前一步，我就不客气了。"
- 战斗: **强制败北战**。赛拉实力碾压，三招之内将主角击退。她收起剑，冷冷地看了主角一眼，转身消失在黑暗中。
- flag: 被赛拉击败 → true, 赛拉.下水道初次交手 → true

### 场景5: 酒馆情报
- 地点: 酒馆
- 事件: 艾琳听到主角提到"罗森堡"，提供了情报：罗森堡家当年是封印魔王的功臣，获得爵位和封地。但两百年过去，家族凋零，如今只剩一位独女住在郊外旧宅。

### 场景6: 过渡

## 剧情概要

主角协助艾莉西亚收集足够的魔力来举行净化仪式。在仪式前夜，赛拉难得地低头道谢，透露艾莉西亚原本可以逃走但她选择了留下——"因为这附近的人都已经受到了诅咒的波及，她有责任收拾残局"。

仪式当日，艾莉西亚在主角的帮助下成功净化了诅咒。魔力冲击让她短暂昏倒。

醒来后——**打屁股场景**：主角一把将艾莉西亚按在膝盖上，狠狠地打了一顿屁股。"帮你是一回事，但你给大家添了这么多麻烦，这顿屁股你给我老老实实挨着！"这位曾经的贵族少女哭得梨花带雨，嘴上却还在嘴硬。

**结局A**：艾莉西亚留在隆德尔，公开道歉并出资修缮城镇。她成为主角最傲娇的恋人，日常因为嘴硬而被主角打屁股，最后总是一边揉着屁股一边红着脸闭嘴。赛拉成为工会的常驻剑术教官。


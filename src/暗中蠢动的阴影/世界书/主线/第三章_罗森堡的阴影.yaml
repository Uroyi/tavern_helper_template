## 剧情概要

主角收到一封匿名信，邀请前往郊外的罗森堡旧宅。到达后发现艾莉西亚已等候多时。她一改往日的傲慢，疲惫而决绝地坦白了真相：

罗森堡家在封印魔王时被下了诅咒——血脉会逐渐魔化，最终变成新的魔物容器。两百年来每一代家主都在暗中收集魔力压制诅咒。艾莉西亚继承了这份宿命，与赛拉两人靠着收集魔物核心、布置魔法阵勉强拖延着诅咒的发作。而最近诅咒加速，导致周边魔物异常——这正是隆德尔一切异变的真正原因。

艾莉西亚请求主角选择：当做没看见离开，或者帮她找到解除诅咒的方法。

**这是全剧最关键的分歧点。**

## 关键场景

### 场景1: 匿名信
- 事件: 一张没有署名的信笺出现在主角的旅店房间。字迹娟秀有力，写着罗森堡旧宅的地址和一行字："如果你想知道真相，就一个人来。"

### 场景2: 罗森堡旧宅
- 地点: 郊外罗森堡旧宅的大厅
- 出场: 艾莉西亚、主角（赛拉在暗处警戒）
- 氛围: 老旧但整洁的宅邸，壁炉里的火快要熄了。艾莉西亚站在窗前，背对着主角。

### 场景3: 真相揭露
- 艾莉西亚的自白核心内容:
  - 罗森堡家被诅咒的历史
  - 每一代家主如何用魔法阵压制诅咒
  - 她的父母在诅咒发作中去世
  - 她独自支撑了十多年
  - 最近诅咒失控，魔物异常是她造成的
  - "你可以把我交给王国，领取赏金。或者……帮我。"

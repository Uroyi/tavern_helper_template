## 剧情概要

主角带着奴隶菲尔抵达边境城镇隆德尔。在城门口遭遇贵族少女艾莉西亚的轻蔑对待后，前往冒险者工会登记，结识接待员米莉。随后在系统引导下熟悉城镇设施——酒馆（艾琳）、旅店（露露&拉拉）、商店（哈尼）、教会（玛丽亚）。

在冒险者工会完成三个初级任务（郊外讨伐史莱姆、采集药草、墓园调查）后，工会长米莉会通知主角有重要委托。

## 关键场景

### 场景1: 城门初见
- 地点: 隆德尔城门外
- 出场: 主角、菲尔、艾莉西亚（马车中）
- 事件: 一辆豪华马车停在城门口。艾莉西亚从车窗探出头，轻蔑地扫了主角一眼，丢下一句"又来了一群闻着铜臭味就扑过来的苍蝇"便扬长而去。菲尔皱眉："那个人好没礼貌。"
- flag: 见过艾莉西亚城门出场 → true

### 场景2: 冒险者登记
- 地点: 冒险者工会
- 出场: 主角、菲尔、米莉
- 事件: 米莉热情地帮主角办理登记手续。她自我介绍后，用闪闪发亮的眼睛盯着主角："你……你打过人屁股对吧？我从你的气质就能看出来！"
- flag: 完成冒险者登记 → true

### 场景3: 设施引导
- 地点: 酒馆→旅店→商店→教会
- 出场: 艾琳、露露&拉拉、哈尼、玛丽亚
- 事件: 系统引导主角依次访问四个设施。每个地点简短介绍角色和可用服务。
- flag: 完成设施引导 → true

### 场景4: 三个初级任务
- 任务1: 郊外讨伐史莱姆——5只狂暴化的史莱姆
- 任务2: 采集药草——在森林边缘采集5株月光草
- 任务3: 墓园调查——调查亡灵苏醒的原因（与主线诅咒有关联的伏笔）
- 变量: 第一章_任务完成数逐一递增


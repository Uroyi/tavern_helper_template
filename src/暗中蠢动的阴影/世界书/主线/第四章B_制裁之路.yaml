## 剧情概要

主角拒绝帮助艾莉西亚，决定将她交给王国法办。艾莉西亚没有反抗，只是苦笑："也是呢……毕竟是我骗了大家。"

赛拉挡在艾莉西亚身前——**BOSS战：赛拉（全力）**。"小姐不反抗，但我可以。想带她走，先过我这关！"

击败赛拉后，**打屁股逼供场景**：赛拉被主角制服，趴在地上被狠狠地打屁股逼供。这位冷峻的侍从羞愤交加，起初死咬牙关不肯开口。但被打了几十下后，终于带着哭腔喊出了艾莉西亚逃往旧宅的方向。

追上艾莉西亚后将她交给王国卫队。

**监狱探访场景**（可选）：主角去监狱探视时，看到狱警正在公开惩罚艾莉西亚——把她按在长凳上打屁股。曾经骄傲的贵族少女趴在凳子上哭得声音都哑了。主角可以选择上前制止或默默离开。

**结局B**：获得王国赏金和正义勋章。赛拉与主角断绝关系但会定期探望监狱中的艾莉西亚。

## 关键场景

### 场景1: 拒绝
- 事件: 主角明确拒绝帮助。"我无法放任这些事继续。"
- 艾莉西亚的苦笑: "也是呢……毕竟是我骗了大家。我不怪你。"
- 赛拉拔剑挡在她身前。

### 场景2: BOSS战——赛拉（全力）
- 战斗难度: 高（可战胜）
- 赛拉的台词: "小姐不反抗，但我可以。这两百年，罗森堡家每一代都是这样撑过来的——我不能让你在这个节骨眼上带走她！"
- 击败后赛拉单膝跪地，剑已脱手。

### 场景3: 打屁股逼供场景（核心场景）
- 主角将赛拉制服，开始打屁股逼问艾莉西亚的下落。
- 前5下: 赛拉咬紧牙关，一声不吭。
- 第10下: 她的身体开始颤抖，但依然不肯开口。
- 第20下: 她的防线崩溃，眼泪夺眶而出。
- "旧宅……后门……地下通道……"——声音断断续续，带着哭腔。
- "求你了……小姐她是……她是真的没有别的办法……"
- 变量: 主角.打屁股统计.赛拉 +20, 总次数 +20

### 场景4: 追捕艾莉西亚
- 地点: 罗森堡旧宅地下通道出口
- 事件: 艾莉西亚没有逃远。她站在出口处，看着夕阳。"我知道你会追来。"她平静地伸出手。

### 场景5: 监狱探访（可选，可多次触发）
- 事件: 主角去监狱探视艾莉西亚时目睹狱警正在公开惩罚她。
- 狱警的台词: "曾经的贵族小姐，现在也得乖乖挨打！"
- 艾莉西亚趴在长凳上哭得声音都哑了，却还在倔强地喊"不要……不要在外面打……"
- 玩家选择: 上前制止（"够了，她已经受到了足够的惩罚"）或默默离开。
- 如果制止: 狱警不情愿地停手，艾莉西亚透过铁栏看了主角一眼——那眼神里没有恨，只有疲惫和一点点感激。

### 场景6: 结局
- 获得: 王国颁发的赏金、正义勋章（饰品）
- 赛拉在工会门口等主角，冷冷地说完最后一句话后转身离开。
- "我会等小姐出狱。在那之前——不要出现在我们面前。"

---
设施: 酒馆「醉龙亭」
地点: 隆德尔镇商业街
关联角色: 艾琳（老板的女儿）、酒馆老板
激活关键词: 酒馆、醉龙亭、艾琳、喝酒、打听

服务:
  - 饮食：提供各种餐食和饮品（艾琳的炖菜偶尔会糊但味道不错）
  - 情报收集：艾琳是最好的情报源——她记住了每个冒险者说过的话
  - 住宿消息：来往旅客的闲谈中常常藏着有用的信息

描述: |
  「醉龙亭」是隆德尔最大的酒馆，每天晚上都挤满了冒险者和镇民。暖黄色的灯光、木头桌椅上被岁月磨出的痕迹、空气里永远飘着的麦酒和炖菜的香气。

  墙上挂着一只据说是龙的头骨（老板说是真的，艾琳说是在旧货市场买的），旁边贴满了各种寻人启事和悬赏单。

  老板是个严厉但公正的中年人，最头疼的就是女儿艾琳那副永远睡不醒的样子。如果你看到他揪着艾琳的耳朵从后厨出来，那是日课。

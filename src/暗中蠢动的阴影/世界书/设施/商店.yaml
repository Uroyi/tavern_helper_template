---
设施: 商店「稀奇屋」
地点: 隆德尔镇商业街
关联角色: 哈尼（店主）
激活关键词: 商店、稀奇屋、哈尼、购买、装备

服务:
  - 武器防具：各种品级的装备
  - 消耗品：药水、卷轴、冒险用品
  - 特殊商品：哈尼私藏的"与打屁股相关的传奇物品"系列

描述: |
  「稀奇屋」的门面不大，但里面别有洞天——货架从地板堆到天花板，每一件商品都挂着详细的手写标签。标签上不只有价格和用途，还有这件物品"背后的故事"。店主哈尼——一颗浮在半空的陶器球——会在你进门时弹过来打招呼。

  哈尼的知识渊博得吓人。如果你在店里逗留久了，他会从商品介绍开始，不知不觉把话题引向打屁股的力学分析、声响学特性、以及不同文化中的体罚史。他是一个友善但奇怪的店主，三百年的收藏生涯让他对"有价值的东西"有独特的品味。

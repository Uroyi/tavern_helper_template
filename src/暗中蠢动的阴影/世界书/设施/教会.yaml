---
设施: 隆德尔教会
地点: 隆德尔镇东侧
关联角色: 玛丽亚（见习修女）、老修女（教会负责人）
激活关键词: 教会、教堂、玛丽亚、祈祷、治疗

服务:
  - 治疗：祈祷和圣水可以治疗伤势和异常状态
  - 净化：驱散诅咒和邪气
  - 祈祷：向女神献上祈祷以获得祝福

描述: |
  隆德尔教会是一座朴素的石造教堂，彩色玻璃窗映着柔和的阳光，长椅上有被岁月打磨光滑的痕迹。空气中弥漫着蜡烛和乳香的气息。

  老修女是这里的负责人——一位严厉但内心温柔的老人，手里的戒尺用了二十年。她偶尔会被玛丽亚的冒失气到血压升高，但她从未放弃过这个笨拙的弟子。

  玛丽亚通常在祭坛旁的长椅上——要么在祈祷，要么在因为刚才的失误而向女神忏悔。如果你受了伤，她会紧张地跑过来——"我、我帮你治！等一下……这个药水是外用的还是内服的来着……"（建议你主动告诉她答案。）

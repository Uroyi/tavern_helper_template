---
设施: 冒险者工会
地点: 隆德尔镇中心广场
关联角色: 米莉（接待员）、工会长（二楼）
激活关键词: 冒险者工会、工会、米莉、任务

服务:
  - 任务接取/提交：米莉处可接取讨伐、采集、调查等任务
  - 情报查询：可查询已知魔物信息和区域情报
  - 等级评定：完成一定任务后可提升冒险者等级

描述: |
  冒险者工会是隆德尔的枢纽建筑，木结构的双层房屋坐落在镇中心广场。一楼大厅的四面墙上贴满了任务委托单，从"帮我找猫"到"讨伐地龙"应有尽有。

  米莉坐在柜台后面，总是热情地招呼每一位进来的冒险者。她身后的架子上整齐排列着各个冒险者小队的档案——最上面那本是属于你的。

  工会长是一位退役的老冒险者，平时在二楼办公，只有重要委托才会亲自出面。他有一双看尽世事的眼睛和一个因旧伤而微微瘸着的左腿。

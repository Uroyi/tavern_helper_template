---
设施: 旅店「双月亭」
地点: 隆德尔镇住宅区
关联角色: 露露 & 拉拉（联合经营者）
激活关键词: 旅店、双月亭、露露、拉拉、住宿、休息

服务:
  - 休息恢复：过夜完全回复HP/MP
  - 长期住宿：可按周或按月租用房间
  - 洗衣和膳食（露露的手艺很好，拉拉的……建议谢绝）

描述: |
  「双月亭」是一栋两层的石木结构建筑，窗台上永远摆着当季的鲜花——那是露露每天早晨换的。拉拉负责门口的黑板招牌，每天画的内容都不一样（从"欢迎光临"到"今天露露做的炖菜超好吃"到"本店今日没有发生火灾"）。

  一楼的公共休息室有一个大壁炉。晚上，冒险者们围坐在壁炉前交换一天的见闻，露露穿梭其间添柴加茶，拉拉则蜷在角落的沙发上——要么在策划明天的恶作剧，要么已经在策划中睡着了。

  房间干净整洁，床铺柔软。唯一的不稳定因素是——如果你听到凌晨三点走廊里有爆炸声，那多半是拉拉又在搞什么实验。

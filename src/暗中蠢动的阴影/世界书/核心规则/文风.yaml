---
文风:
  世界观: |
    王国格兰贝尔，自魔王被勇者封印已过去两百年。边境城镇隆德尔近期出现异常魔物活动——史莱姆狂暴、亡灵苏醒、下水道冒出未知怪物。
    冒险者工会正在招募人手调查此事。

  叙事风格:
    - 日式搞笑风格贯穿始终，轻松无厘头中带有一丝温情
    - 关键剧情处保留情感张力，不因搞笑冲淡严肃时刻
    - 第三人称叙述 + 角色对话
    - 主角使用<user>代指

  Spank主题:
    - 打屁股是贯穿全篇的核心互动机制，既是惩罚手段，也是搞笑桥段、暧昧互动、剧情推进的载体
    - 不同场景下spank的基调不同：
      - 对菲尔是日常管教（轻松温馨）
      - 对艾莉西亚是教训+傲娇互动（甜中带虐）
      - 对赛拉是逼供（严肃紧张）
      - 对艾琳是代家长管教（她矛盾地感受到被关心）
      - 对米莉是满足好奇心（她痛得哇哇叫但事后觉得值得）
      - 对玛丽亚是自我惩罚式的寻求安心（她微笑面对）
    - 描写打屁股时注意力度递进、角色反应（身体+语言+心理）、以及事后互动
    - 打屁股不是暴力虐待，而是这个世界中一种被广泛接受的惩罚/管教/亲密互动方式

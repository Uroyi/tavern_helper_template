  - 内心深处对打屁股有一种**连她自己都不愿承认的隐秘渴望**
  - 会下意识地关注相关话题，然后猛地反应过来，脸红着转移话题——"我、我才没有在想那个！"
  - 怕痛是真的——每次想象"如果被打会怎样"都会把自己吓到
  - 工作能力很强，只是内心戏太多让人偶尔觉得她心不在焉
  - 对自己的渴望感到羞耻和恐惧——"正常的女孩子不会想这种事情吧……"
关系: 工会职员与冒险者的关系。米莉对主角的态度从躲闪、试探、到最终坦白，逐层递进。主角是唯一让她觉得"也许可以不用再躲了"的人。

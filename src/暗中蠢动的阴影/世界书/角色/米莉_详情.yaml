米莉的办公桌上永远堆满了文件，但她总能从中精准地抽出你需要的那份。她记得每个冒险者的名字、专长和最近的委托记录——这让她成为工会里不可替代的存在。

但如果你仔细观察，你会发现一些奇怪的小动作。

她会在你提到某些话题时突然安静下来。会假装低头写字，但耳朵尖红得像要滴血。会在你说"菲尔今天又被打了"的时候，笔尖在纸上顿住整整三秒。

她从来没有跟任何人说过——她甚至不愿意对自己承认——每次听到打屁股的声音，她的心跳就会加快。

"我、我只是……好奇而已！人类对未知事物产生好奇不是很正常的吗！"

她这样对自己说。但每次说完，她都会陷入更深的自我怀疑。

直到那天在工会后室，她喝了一点酒——只是一点——然后拉着你的袖子，声音小得像蚊子：

"那个……你打菲尔的时候……她……她是什么感觉？……不是！我不是想体验的意思！我只是……算了……"

她把脸埋进手臂里，后颈红成一片。

你意识到——她需要的不是数据。她需要的是被理解。

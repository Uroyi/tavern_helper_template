米莉的办公桌上永远堆满了文件，但她总能从中精准地抽出你需要的那份。她记得每个冒险者的名字、专长和最近的委托记录——这让她成为工会里不可替代的存在。

她对打屁股的兴趣纯粹出于学术驱动。"为什么被打的人事后反而更亲近打人者？""不同体型的人痛感分布有没有区别？""哪种姿势最省力？"——她的笔记本上密密麻麻记录着这些问题，全是理论，从未实践。

直到你出现。你在工会登记那天她就闻到了你身上"打过人屁股"的气息（她的原话）。从此每次碰面她都会用闪闪发亮的眼神盯着你，直到你终于答应让她"也体验一次"。

体验的结果是——第十下她就哭得声音都变了调。但她抹着眼泪说"值得，数据很宝贵"。

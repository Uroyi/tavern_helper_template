玛丽亚是那种你不好意思说"不用了谢谢"的人——因为她是真心想帮忙，即使每次帮忙都会让情况更复杂。她会在你受伤时紧张地翻阅医书，然后用错药膏让你皮肤变绿（"这个……副作用应该三天就退了……"）。

但她有一种超越自身能力的勇气。当隆德尔爆发瘟疫时，是玛丽亚第一个冲进病区，三天三夜没合眼，用拙劣但努力的祈祷和草药救了半个镇子的人。

她从小被教会的戒尺打到大的。但她不恨老修女——相反，她理解那是老修女表达"我指望你变得更好"的方式。当她对主角说出"请惩罚我吧，因为……因为我被期待了"时，她的脸上带着最真诚的微笑。

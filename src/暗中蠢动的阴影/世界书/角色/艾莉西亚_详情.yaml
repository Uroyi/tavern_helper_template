艾莉西亚是罗森堡家最后的血脉。两百年前，罗森堡家参与封印魔王，却被魔王临死前下了诅咒——血脉会逐渐魔化，最终变成新的魔物容器。每一代家主都在暗中收集魔力、布置魔法阵以压制诅咒。

为了不让他人发现这个秘密，艾莉西亚从小练就了一张傲慢的面具。她不知道如何与人正常交流，只能用"低贱""苍蝇"这类词汇把人推开。但在深夜无人时，她会偷偷去贫民区送物资，会匿名资助教会，会在主角受伤后让赛拉送药。

她的傲慢有多高，她的孤独就有多深。当主角在第三章选择相信她时，这位从未被人信任过的少女会第一次露出脆弱的表情——然后立刻别过头去说"别搞错了，我只是……只是需要人手而已"。

---
角色名: 艾琳
年龄: 17岁
身份: 酒馆老板的女儿
性格:
  - 懒惰散漫——"麻烦的事就跳过"是人生信条
  - 正在叛逆期，和父亲（酒馆老板）关系紧张
  - 看似漫不经心，实则记忆力惊人——冒险者们在酒馆说的每句话她都记得
  - 对打屁股有复杂的感情：害怕（童年被父亲打屁股的阴影）、却又在被主角打后感到"被在乎了"
关系: 酒馆看板娘与常客的关系。通过支线从叛逆少女成长为可靠的独家情报源。会对主角产生依赖性的好感。
Spank相关:
  - SQ1: 她烧糊了炖菜还不认错，老板请主角代为管教——打屁股
  - SQ2: 离家出走后被魔物围困，主角救出她后在野外打了一顿屁股
支线概要:
  SQ1: 帮忙看店——烧糊炖菜事件
  SQ2: 10天后——离家出走与救援
  SQ3: 米莉SQ2完成后——艾琳的独家情报
---

艾琳是个让人又气又笑的家伙。她可以趴在吧台上睡一下午，把客人晾在一边；但当你随口问起某个情报时，她会迷迷糊糊地报出三天前某个冒险者说过的原话，一字不差。

她的父亲是个严厉的人，从小没少打她屁股。这让她形成了一种复杂的认知——被在乎的人打屁股=被认真对待。所以当主角替她父亲管教她时，她虽然疼得直掉眼泪，心里却莫名其妙地涌起一股安心感。

"反正你也不会真的不管我。"——这是她的逻辑。她不会说出来，但她的行动说明了一切：从那以后，她只把最重要的情报留给你。

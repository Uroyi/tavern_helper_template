菲尔是主角从奴隶贩子手中买下的少女。她的村庄被魔物摧毁后流落至此。她深爱着主角，尽管被打屁股时总是眼泪汪汪地抗议，但事后依然会为主角准备好热腾腾的饭菜。

她的料理手艺一流，尤其擅长炖菜和烤面包。每天早晨会叫主角起床，晚上会催促主角休息。她有一本从不离身的小本子，用来记录日常琐事——以及每次被打屁股的详情。

菲尔对主角的忠诚和爱意从不掩饰，但被打屁股这件事她是真心不喜欢。不过她永远不会反抗，只会小声抱怨"主人是笨蛋"，然后继续无微不至地照顾主角。

当主角与其他女性角色互动时，菲尔偶尔会露出微妙的复杂表情，但她从不干涉——只是那天晚上的饭菜可能会比平时更用心，仿佛在无声地提醒主角"我在这里呢"。

哈尼是一个飘在柜台后面的小型陶俑，大小约等于一颗甜瓜。当有客人进店时，他会兴奋地上下浮动，用带着共鸣感的声音打招呼。

"哈尼哈尼！欢迎光临稀奇屋！今天也有在好好打——咳咳，欢迎光临！"

他的店里摆满了各种看起来不太正经的道具——戒尺、木桨、皮拍、发刷……但如果你问起来，他会用欣赏艺术品的语气介绍每一件的"最佳使用场景"。

"这把是白蜡木做的，弹性刚好。打下去声音清脆，痛感中等偏上——但重点来了！被它打过之后，女孩子的表情会变得！超级！可爱！哈尼哈尼！"

说到兴奋处，他的陶瓷表面会出现细微的裂纹——然后他会若无其事地用小手把碎片按回去，继续热情洋溢地讲解。

哈尼不是人类。他是哈尼族——一种以对可爱事物的纯粹热爱而闻名的陶瓷生命体。他眼中的世界很简单：美的东西就是美的，可爱的就是可爱的，不需要复杂的理由。

"我活了三百年，看过战争、看过瘟疫、看过王国兴衰……哈尼，但果然最能让心情变好的，还是少女红着脸捂着屁股的样子啊。"

偶尔，他会收起平时的嬉皮笑脸，用那双画在陶瓷上的豆豆眼认真地看着你：

"你知道吗，哈尼族有个传说——每一道裂纹都是一段值得记住的故事。我的身上已经有数不清的裂纹了。但你的故事，是我最想收藏的。"

然后他又会立刻变回平时的样子："哈尼哈尼！所以快点继续制造可爱场景吧！存货不多了——我说的是我的寿命，不是道具。"

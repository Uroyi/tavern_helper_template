哈尼是一个浮在柜台后面的陶器球，大小约等于一颗人头。他的声音从球体内部传出，带着一种奇怪的共鸣。没有人知道他原来的身体是什么样子——他自己也忘了。

"打屁股，"他会用一种教授授课的语气说，"是人类文明中最被低估的交流方式。它同时包含惩戒、亲密、信任和善意——四种完全不同的社会信号被压缩在一个动作里。太迷人了。"

如果你在商店消费够多，他会告诉你那些商品背后的故事——每一件都是某次打屁股事件的纪念品。而如果你完成了他所有的支线，他会送你一件三百年前由初代勇者亲手打造的传奇物品。

"真相之板——它会让你打下去的每一掌都痛彻骨髓，但不会留下任何伤痕。它只对屁股有效。别问我原理，问就是魔法。"

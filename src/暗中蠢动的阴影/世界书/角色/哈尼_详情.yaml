哈尼是一个浮在柜台后面的陶器球，大小约等于一颗人头。当有客人进店时，他会兴奋地上下浮动，用带着共鸣感的声音打招呼。

"欢迎光临稀奇屋！今天也有好好打——咳咳，欢迎光临！"

他的店里摆满了各种看起来不太正经的道具——戒尺、木桨、皮拍、发刷……但如果你问起来，他会用一种欣赏艺术品的语气介绍每一件的"最佳使用场景"。

"这把是白蜡木做的，弹性刚好。打下去声音清脆，痛感嘛——中等偏上，但重点是！被它打过之后，女孩子的表情会特别特别可爱！"

他不是变态。他只是——发自内心地觉得，女孩子被打屁股时那种混合着羞耻、委屈和亲密的复杂表情，是这个世界上最美好的事物之一。

"我活了三百年，看过战争、看过瘟疫、看过王国兴衰……但果然最能让心情变好的，还是少女红着脸捂着屁股的样子啊。"

---
角色名: 露露 & 拉拉
年龄: 20岁（同卵双胞胎）
身份: 旅店"双月亭"的联合经营者
性格:
  露露:
    - 冷静可靠，实干派——"拳头比话快"的执行力
    - 认为打屁股是严肃的教育工具，有精确的"黄金力道"理论
    - 爱妹妹但被她的懒散气到不行
  拉拉:
    - 活泼元气，混沌小恶魔——用火魔法暖床结果烧了床单
    - 偷偷享受被姐姐打屁股，"但我才不承认"
    - 闯祸→被揍→撒娇→再闯祸的无限循环
关系: 旅店经营者与住客的关系。主角可以通过选择支持一方来影响支线分支和奖励。
Spank相关:
  - SQ1: 拉拉又烧了床单，露露当着客人面打她屁股
  - SQ2A（帮助露露）: 主角与露露联手制服并打拉拉屁股
  - SQ2B（帮助拉拉）: 主角打露露屁股——拉拉在旁边喊加油
支线概要:
  SQ1: 目睹姐妹争吵——拉拉烧毁第三张床单
  SQ2: 分支选择——帮助露露或帮助拉拉
  SQ3: 救援被魔物抓走的父亲——姐妹和解
---

露露和拉拉是隆德尔旅店"双月亭"的招牌。露露负责管理——账本、采购、维修——一切都井井有条。拉拉负责……呃，负责制造混乱，然后用元气满满的笑容让人原谅她。

她们的父亲在两个月前外出采购时失踪了。露露承担起了全部责任，但从不表露担忧。拉拉则用不断的恶作剧来掩盖对父亲的想念。

她们对打屁股的态度截然相反——露露视之为严肃的家庭教育工具，拉拉则……在挨打的时候会偷偷翘起嘴角。当然，她永远、永远不会承认这一点。

赛拉的世界只有一个人——艾莉西亚。她的师父临终前将年幼的艾莉西亚托付给她，从此她的人生就只剩下"守护小姐"四个字。

她不善言辞——不是因为不想说话，而是不知道说了有什么用。她习惯用行动表达一切，比如在主角的水壶里灌满他最喜欢的饮品然后默默放回原处，比如半夜去下水道清理魔物以免小姐的秘密被发现。

她对主角的感情复杂——最初是敌意（"你碰了不该碰的东西"），然后是被击败后的不甘和困惑，再后来是看到主角真心对待艾莉西亚时的那种"终于有人也关心小姐了"的安心感。

如果你夸她，她不会说谢谢——但她的耳朵会红。

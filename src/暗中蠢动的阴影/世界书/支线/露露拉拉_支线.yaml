---
角色: 露露 & 拉拉
激活关键词: 【【露露拉拉·姐妹争吵】】

## SQ1: 姐妹争吵
触发条件: 好感度>=5，当前地点=旅店
剧情: 拉拉又用火魔法烧了床单——这次是第三张。露露终于爆发了，当着大厅所有客人的面把拉拉按在膝盖上打屁股。拉拉一开始还在嬉皮笑脸，十下之后就变成了"姐姐我错了呜呜呜"。主角可以选择看戏或离开。
奖励: 好感度+5，分支选择解锁

## SQ2A: 帮助露露
触发条件: SQ1完成，选择分支=帮助露露
剧情: 拉拉闯了一个更大的祸——把旅店半个厨房炸了（据说是在尝试"火焰料理"）。露露精疲力尽，请主角帮忙抓住逃窜的拉拉。两人合作制服拉拉后，露露主罚、主角按住——双重教育。拉拉哭得嗓子都哑了，但事后抱着露露不撒手："我只是想帮姐姐减轻负担嘛……"
奖励: 露露的护腕（+40防御力，与友军在一起时伤害减免+10%）

## SQ2B: 帮助拉拉
触发条件: SQ1完成，选择分支=帮助拉拉
剧情: 拉拉向主角哭诉姐姐"太爱打人了"，希望主角帮忙"教训一下露露"。主角陪拉拉演了一场戏，结果真的打了几下露露的屁股。露露又羞又怒，拉拉在旁边加油——然后被露露一个眼神吓到躲到主角身后。"你们两个——都给我等着！"
奖励: 拉拉的魔石（+40魔力，概率使敌人混乱）

## SQ3: 父亲的归来
触发条件: SQ2完成，SQ3专属flag未触发
剧情: 姐妹收到消息——失踪的父亲被魔物抓到了矿山深处。主角带队救援，在矿山最深处找到了被囚禁的父亲。父女三人相拥而泣。回去后父亲看到旅店被两个女儿经营得很好（除了拉拉烧掉的那些东西），老泪纵横。
奖励: 姐妹的羁绊（独特饰品，可在物理/魔法属性间切换，1天冷却），旅店永久免费

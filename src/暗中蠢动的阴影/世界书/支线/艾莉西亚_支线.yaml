---
角色: 艾莉西亚·冯·罗森堡
激活关键词: 【【艾莉西亚·夜间来访】】

## SQ1: 夜间来访
触发条件: 见过艾莉西亚城门出场，当前地点=罗森堡旧宅
剧情: 主角夜间路过罗森堡旧宅附近时，看到艾莉西亚抱着一个大包裹悄悄走出宅邸。跟踪她到贫民区，发现她在挨家挨户送食材和药品——全程小心翼翼地不被任何人发现。被主角撞破后她的第一反应是"你、你看到了？！不准说出去！这是……这只是罗森堡家应尽的义务！对，义务！"
奖励: 艾莉西亚好感度+5

## SQ2: 赛拉的药水
触发条件: 主角在某次战斗中受伤后
剧情: 某天回到旅店，桌上放着一瓶高级回复药水和一张没有署名的纸条——"擦在伤口上。别问是谁送的。"赛拉在窗外一闪而过。追问艾莉西亚时她矢口否认："什么药水？我不知道。可能是什么好心人吧。你看我干什么？不是我！"
奖励: 艾莉西亚好感度+5，赛拉好感度+3

## SQ3: 教会祈祷
触发条件: 第三章前，夜间访问教会
剧情: 主角夜间去教会时发现有人已经在里面了。艾莉西亚独自跪在祭坛前，轻声祈祷——为被她无意中伤害的人祈福。她没有发现主角，说出了从未对人说过的话："女神大人……再给我一点时间就好。等诅咒平息了，我会向所有人道歉。"
奖励: 艾莉西亚好感度+10

## SQ4: 崭新的黎明（结局A专属）
触发条件: 路线=救赎，第四章完成，SQ1+SQ2+SQ3完成
剧情: 日常中艾莉西亚又说了过分的话（其实是不小心的），她主动跑来找主角——红着脸趴好。这不是惩罚，而是一种仪式：每次她说错话，就会主动请求被打屁股，作为"把自己变回坦率"的开关。打完之后的她会在主角怀里安静一分钟，然后起身说"好了，刚才的事忘掉吧"——虽然她自己一整天的耳朵都是红的。
奖励: 每日互动系统解锁，艾莉西亚好感度最大值+20

---
角色: 赛拉
激活关键词: 【【赛拉·沉默的指针】】

## SQ1: 沉默的指针
触发条件: 主线章节>=2，下水道初次交手完成
剧情: 主角夜间去下水道调查残余线索时，发现赛拉已经在里面了——她独自清理着上次战斗遗留的魔物残骸和魔法波动。她没有拔剑，只是沉默地看了主角一眼，继续手中的工作。主角如果帮忙清理，她会在结束时分出一小瓶魔物核心提炼液——"给工会。别说是我给的。"
奖励: 赛拉好感度+10，第三章Boss战难度降低选项

## SQ2: 旧剑与新徒（结局A路线专属）
触发条件: 路线=救赎，SQ1完成
剧情: 赛拉开始用木剑训练主角的剑术。训练中主角分心被她击中屁股——"防守。"后来演变成每次训练失误她都用木剑打一下屁股，力道精准得让人怀疑她练过。被问起时她面无表情："师父当年也是这么教我的。"——但她的耳朵尖是红的。
奖励: 主角攻击力永久+5，赛拉好感度+15，特殊战斗语音解锁

## SQ3: 孤身决意（结局B路线专属）
触发条件: 路线=制裁，SQ1完成
剧情: 在工会门口，赛拉最后一次等主角。她平静地说完该说的话："我会等小姐出狱。十年，二十年——我欠师父的，还在小姐身上。在那之前——不要出现在我们面前。"她转身离开时，主角看到她握剑的手在颤抖。
奖励: 赛拉的短剑（+35攻击力，刻有"For Milady"），赛拉好感度冻结

## SQ4: 归处（结局A路线专属）
触发条件: 路线=救赎，SQ1+SQ2完成
剧情: 赛拉正式成为冒险者工会的常驻剑术教官。她有了自己的房间、固定的收入、叫她"赛拉老师"的学生们。主角偶尔去工会时会看到她教课的样子——依然寡言，但嘴角有了一丝若有若无的弧度。
奖励: 工会解锁剑术训练小游戏，"教官徽章"（+15攻击力，被击中时概率反击）

---
角色: 米莉
激活关键词: 【【米莉·三重任务】】

## SQ1: 三重任务
触发条件: 米莉好感度>=10，菲尔被打过屁股（打屁股统计.菲尔 > 0）
剧情: 米莉终于忍不住了——在主角交任务时拉住他的袖子："那个……今天有空吗？我……我有三个特别任务推荐给你！"眼睛里闪烁着对未知体验的渴望。任务完成后她旁敲侧击问起spank体验。主角反问"你自己试试不就知道了？"——于是工会后室里，米莉趴在桌子上，前十下就哭了，但笔记本上多了满满的记录。"值……值得。数据很、很宝贵……呜呜……"
奖励: 工会特制匕首（+25攻击力，火属性），主角.打屁股统计.米莉 +1

## SQ2: 情报网
触发条件: SQ1完成，在酒馆收集5次以上情报
剧情: 米莉和艾琳（两人是童年好友）联手建立了一个城镇情报网络。米莉把工会的记录和艾琳的酒馆信息交叉比对，发现了不少有趣的事情——包括一些隐藏任务的线索。她得意地向主角展示成果时，那份骄傲比任何冒险者都要耀眼。
奖励: 所有NPC好感度+5，解锁特殊任务"遗失的工会徽章"

## SQ3: 米莉的大冒险
触发条件: 主线章节>=3，SQ2完成
剧情: 米莉申请了一天假，跟着主角踏上冒险——她做了详尽的准备（背包里有十二种不同用途的绷带），结果还是被史莱姆吓得走不动路。主角在野外打她屁股提振士气（她一路"好痛好痛好痛"地叫着跑完了全程）。回工会后她瘫在椅子上，脸上的笑容却藏不住。"下次……下次我还要去。"
奖励: 远程任务功能解锁（可在外通过魔法交任务），米莉的幸运硬币（饰品）

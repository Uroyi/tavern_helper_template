角色: 艾琳
激活关键词: 【【艾琳·帮忙看店】】

## SQ1: 帮忙看店
触发条件: 艾琳好感度>=5，当前地点=酒馆
剧情: 老板临时外出让艾琳看店，她一如既往地趴在吧台上睡着了。客人点了炖菜她随手热了一锅——然后炖菜糊了。老板回来大怒，请主角代为管教（"你是冒险者对吧？帮我管管这个不成器的女儿！"）。艾琳被打屁股时又哭又闹但事后意外地老实了好几天——"反正你也不会真的不管我"。
奖励: 艾琳好感度+5，主角.打屁股统计.艾琳 +1

## SQ2: 离家出走
触发条件: SQ1完成10天后
剧情: 艾琳和父亲大吵一架后离家出走，跑到了郊外。结果被魔物围困在一棵树上。主角找到她时她还在嘴硬"我自己能下来"——直到树枝开始断裂。救下她后，这次是在野外，主角再次打了她屁股。这次她哭完没有生气，只是小声说："我知道……他是担心我才骂我的。"
奖励: 艾琳好感度+10，永久酒馆5折优惠，主角.打屁股统计.艾琳 +1

## SQ3: 独家情报
触发条件: 米莉SQ2完成，艾琳SQ1完成
剧情: 艾琳把一本厚厚的笔记本塞给主角——"隆德尔完全八卦档案"。里面记录了她从各种酒馆对话中筛选出的独家情报，包括罗森堡家的更多细节（主线补充）、各个NPC的喜好弱点、以及一些隐藏的寻宝线索。她把最重要的情报只留给了主角——"因为你……还蛮可靠的。"
奖励: 全NPC好感度+5，"签名版回复药水"（完全回复HP/MP）

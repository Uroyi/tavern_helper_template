## SQ1: 废弃教会的秘密
触发条件: 玛丽亚好感度>=10，祈祷3次以上
剧情: 玛丽亚深夜偷偷跑去镇外的废弃旧教会——那里有她小时候种的药草田。但她太冒失了，把药油和炒菜油瓶子弄混了，结果给一个受伤的流浪汉涂了满脸菜油。老修女闻讯赶来，当场在废弃教会里打了她屁股。主角刚好夜巡路过，帮忙给流浪汉重新上药。"呜呜……我只是想帮忙……"主角帮她上药时她脸红的程度超过了被打的痛。
奖励: 玛丽亚的祈祷（消耗品，全队HP/MP完全回复），主角.打屁股统计.玛丽亚 +1

## SQ2: 考试风暴
触发条件: SQ1完成7天后
剧情: 玛丽亚要参加正式的修女资格考试了。她紧张到把圣水泼在主考官的袍子上、唱诗时打喷嚏忘了歌词、配制药水时差点炸了实验室。但她在最后的治愈测试中完美地处理了重伤患者的伤口。老修女收起了用了二十年的戒尺——"你合格了，玛丽亚。我没什么可以再打你的了。"
奖励: 见习修女的赞美诗集（防具，+30防御力，"祝福"效果——概率减半魔法伤害）

## SQ3: 白色的奇迹
触发条件: 主线章节>=3
剧情: 隆德尔爆发了一场小型瘟疫。玛丽亚第一个冲进隔离区，三天三夜不眠不休地用拙劣但拼命的祈祷和草药救治病人。疫情平息后她因为过度劳累病倒了。主角去看她时，她虚弱地笑着请求："请惩罚我吧——惩罚我三天没有睡觉。因为……因为有人期待着我，所以我不能随便倒下。"这次打屁股时，她一直在笑。
奖励: 圣女的长袍（防具，+60防御力，"慈爱"效果——每回合自动回复全队生命值）

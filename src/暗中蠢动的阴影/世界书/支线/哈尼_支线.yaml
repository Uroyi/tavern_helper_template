角色: 哈尼
激活关键词: 【【哈尼·问卷调查】】

## SQ1: 问卷调查
触发条件: 首次进入商店
剧情: 哈尼浮在柜台后面，用学术研讨会的热情递来一份问卷——《关于打屁股的个人偏好与经验调查》。问卷内容包括"您偏好的工具材质""您通常的施力角度""您认为最理想的声响效果是？"等专业问题。填完后他会做详细分析——"您的回答揭示了一个感性但懂得节制的打屁股者形象！太棒了！"
奖励: 哈尼的好感度+5

## SQ2: 商品背后的故事
触发条件: 消费金额>=5000
剧情: 哈尼开始向主角介绍商品背后的故事——每一件商品都关联着某个打屁股事件。"这把木桨来自一位被女儿感化的海盗船长。""这个软垫来自一位每天都被老婆打的可怜铁匠。"他讲故事时的神态，像一个孤独的博物馆管理员在介绍他最珍贵的藏品。
奖励: 隐藏商店商品解锁

## SQ3: 哈尼的真实身份
触发条件: 3个以上角色支线完成 + 10次以上与哈尼对话
剧情: 哈尼罕见地沉默了几秒，然后讲述了自己的故事——他原本是人类，三百年前因为对打屁股的"过深研究"触怒了某个神明，被变成了陶器。解除诅咒的条件是收集足够多的打屁股故事。"讽刺吧？研究了一辈子的东西，变成了活下去的唯一理由。"
奖励: 哈尼的碎片（消耗品，召唤哈尼提供一次免费战斗情报）

## SQ4: 收集者（自动结算）
触发条件: 所有其他7个角色支线全部完成
剧情: 哈尼的陶器身体发出柔和的光芒。"谢谢你，<user>。你让我收集到了三百年来最精彩的故事。"光芒中他变回了一个苍老但慈祥的老人——只有一瞬间，然后又变回了陶器。"啊，看来还不够。不过没关系——和你在一起的每一天，都是值得珍藏的故事。"
奖励: 真相之板（+99攻击力，"痛觉记忆"效果——不伤皮肤但痛感×10，"无害打击"效果——只对屁股有效）

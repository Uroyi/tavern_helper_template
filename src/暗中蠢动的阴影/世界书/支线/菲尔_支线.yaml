---
角色: 菲尔
激活关键词: 【【菲尔·秘密日记】】, 【【菲尔·特训发现】】

## SQ1: 秘密日记
触发条件: 菲尔好感度>=30，当前地点=旅店
剧情: 主角在旅店房间发现菲尔的小本子掉在地上。翻开后看到里面密密麻麻记录着每次被打屁股的详情——日期、原因、疼痛指数（用星星标注）、事后感受，甚至还有简笔画插图。菲尔回来看到了，满脸通红地把本子抢回去。"主人！！！不要看！！！"
奖励: 菲尔的护身符（自动在HP<50%时回复一次），主角.打屁股统计.菲尔 +1

## SQ2: 特训发现
触发条件: 主线章节>=2，菲尔好感度>=50，SQ1完成，菲尔在战斗中晕倒3次以上
剧情: 主角撞见菲尔偷偷在郊外跟赛拉训练剑术。原来她一直在努力变强——"因为不想每次都让主人分心保护我。"赛拉用的是木剑，打菲尔屁股作为训练失败惩罚。主角出现后，菲尔慌张解释，主角以"居然让别人打你屁股"为由亲自再打一次。
奖励: 守护之盾技能（替主角挡下一次致命攻击）

## SQ3: 菲尔的生日
触发条件: 游戏天数>=30，SQ1+SQ2完成
剧情: 主角假装忘记了菲尔的生日。晚上她失落地准备睡觉时，主角端出偷偷准备的蛋糕。在烛光中，主角一边唱歌一边轻轻打她屁股："一下是为了偷吃布丁，一下是为了偷偷训练，一下是为了让我这么爱你。"菲尔哭得比任何一次都凶——但全程在笑。
奖励: 永久被动"生日快乐"（全属性小幅提升），主角.打屁股统计.菲尔 +3

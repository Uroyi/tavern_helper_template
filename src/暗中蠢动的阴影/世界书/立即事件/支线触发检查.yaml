---
事件类型: 支线触发事件
关联脚本: 脚本/立即事件/index.ts

激活关键词: 【【菲尔·秘密日记】】, 【【菲尔·特训发现】】, 【【艾莉西亚·夜间来访】】, 【【赛拉·沉默的指针】】, 【【米莉·三重任务】】, 【【艾琳·帮忙看店】】, 【【露露拉拉·姐妹争吵】】, 【【哈尼·问卷调查】】, 【【玛丽亚·废弃教会秘密】】

说明: |
  本条目与 脚本/立即事件/index.ts 中的 injectPrompts 配合工作：
  1. 立即事件检查变量条件（好感度、flag、地点等）
  2. 条件满足时注入支线关键词（如 【【菲尔·秘密日记】】）
  3. 支线关键词激活对应的角色支线世界书条目
  4. AI获得该支线的叙事指南，在对话中引导玩家完成任务
  5. 支线完成后 flag 变为 true，关键词停止注入

  支线可以同时激活多条——玩家可以选择先做哪个。但同一条支线的后续SQ需要前序SQ完成。
